<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VisualSync - Aprimoramento de imagens com IA">
    <title>VisualSync - Transformando imagens com IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #00D4FF;
            --dark: #0A0A0A;
            --card: #121212;
            --text: #F0F0F0;
            --gray: #B0B0B0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--dark); 
            color: var(--text); 
            line-height: 1.6;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 18px 0;
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; }

        .logo { 
            font-size: 2rem; 
            font-weight: 800; 
            background: linear-gradient(90deg, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Welcome */
        .welcome-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a2e, var(--dark));
        }
        .logo-welcome { font-size: 5rem; font-weight: 900; margin-bottom: 20px; }
        .name-input { 
            padding: 20px 30px; 
            width: 360px; 
            border-radius: 50px; 
            border: 2px solid #333; 
            background: #1a1a1a; 
            color: white; 
            font-size: 1.2rem;
        }
        .proceed-btn { 
            padding: 20px 48px; 
            background: var(--primary); 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            font-weight: 700; 
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Hero */
        .hero { padding: 180px 20px 120px; text-align: center; }
        .greeting { font-size: 3rem; color: var(--primary); }

        /* Sections */
        .section { padding: 100px 20px; }
        .section-title { text-align: center; font-size: 2.8rem; margin-bottom: 60px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 28px; 
        }

        .card {
            background: var(--card);
            padding: 34px;
            border-radius: 24px;
            border: 1px solid #222;
            transition: all 0.4s ease;
        }
        .card:hover { 
            transform: translateY(-15px); 
            border-color: var(--primary); 
        }

        .before-after {
            display: flex;
            gap: 10px;
            border-radius: 16px;
            overflow: hidden;
        }
        .before-after img {
            width: 50%;
            height: 260px;
            object-fit: cover;
        }

        .stat-number { font-size: 3.2rem; font-weight: 800; }

        .cta-section {
            background: linear-gradient(135deg, var(--primary), #00a8cc);
            color: #000;
            text-align: center;
            padding: 120px 20px;
        }
        .cta-button {
            padding: 22px 60px;
            background: #000;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.4rem;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .logo-welcome { font-size: 3.8rem; }
        }
    </style>
</head>
<body>

    <!-- Welcome Screen -->
    <section id="welcome-screen" class="welcome-screen">
        <div class="container">
            <div class="logo-welcome">Visual<span style="color:var(--primary)">Sync</span></div>
            <h1>Bem-vindo à VisualSync</h1>
            <p style="font-size:1.4rem; margin:20px 0 30px; color:var(--gray);">Transformando imagens comuns em resultados extraordinários</p>
            
            <input type="text" id="user-name" placeholder="Digite seu nome" class="name-input">
            <button onclick="proceedToMain()" class="proceed-btn" style="margin-top:20px;">Prosseguir</button>
            <p id="error-msg" style="color:#ff6b6b; margin-top:15px; min-height:28px;"></p>
        </div>
    </section>

    <!-- Main Content -->
    <div id="main-content" style="display: none;">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="container nav-container">
                <div class="logo">VisualSync</div>
                <a href="https://wa.me/5516989477519" target="_blank" style="background:var(--primary); color:#000; padding:12px 32px; border-radius:50px; text-decoration:none; font-weight:700;">WhatsApp</a>
            </div>
        </nav>

        <!-- Hero -->
        <header class="hero">
            <div class="container">
                <h2 id="greeting" class="greeting"></h2>
            </div>
        </header>

        <!-- Portfólio -->
        <section class="section" style="background:#111;">
            <div class="container">
                <h2 class="section-title">Antes × Depois</h2>
                <div class="grid" id="portfolio-grid"></div>
            </div>
        </section>

        <!-- Estatísticas -->
        <section class="section">
            <div class="container">
                <div class="grid" id="stats-grid"></div>
            </div>
        </section>

        <!-- Planos -->
        <section class="section">
            <div class="container">
                <h2 class="section-title">Planos</h2>
                <div class="grid" id="plans-grid"></div>
            </div>
        </section>

        <!-- Depoimentos -->
        <section class="section" style="background:#111;">
            <div class="container">
                <h2 class="section-title">Depoimentos</h2>
                <div class="grid" id="testimonials-grid"></div>
            </div>
        </section>

        <!-- CTA -->
        <section class="cta-section">
            <div class="container">
                <h2>Pronto para transformar suas imagens?</h2>
                <a href="https://wa.me/5516989477519" target="_blank" class="cta-button">Falar no WhatsApp</a>
            </div>
        </section>
    </div>

    <script>
        const portfolioItems = [
            { titulo: "Foto Antiga Restaurada", antes: "https://picsum.photos/id/1015/800/600", depois: "https://picsum.photos/id/106/800/600" },
            { titulo: "Anúncio de Produto", antes: "https://picsum.photos/id/201/800/600", depois: "https://picsum.photos/id/237/800/600" }
        ];

        const stats = [
            { numero: 5200, texto: "Imagens transformadas" },
            { numero: 1240, texto: "Clientes satisfeitos" },
            { numero: 98,  texto: "Satisfação", sufixo: "%" },
            { numero: 24,   texto: "Horas de entrega" }
        ];

        const planos = [
            { nome: "Essencial", preco: "49,90", itens: ["10 créditos", "Qualidade HD", "Entrega 24h"] },
            { nome: "Profissional", preco: "79,90", itens: ["20 créditos", "Prioridade", "Revisões ilimitadas"], destaque: true }
        ];

        const depoimentos = [
            { nome: "Carlos Mendes", texto: "O cardápio ficou incrível! Minhas vendas aumentaram muito." },
            { nome: "Ana Beatriz", texto: "Minhas fotos antigas voltaram à vida. Serviço incrível!" }
        ];

        function proceedToMain() {
            const nome = document.getElementById('user-name').value.trim();
            if (!nome) {
                document.getElementById('error-msg').textContent = "Por favor, digite seu nome.";
                return;
            }
            localStorage.setItem('userName', nome);
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('greeting').textContent = `Olá, ${nome}! 👋`;
            renderAll();
        }

        function renderAll() {
            // Portfólio
            document.getElementById('portfolio-grid').innerHTML = portfolioItems.map(p => `
                <div class="card">
                    <h3 style="text-align:center;margin-bottom:15px;">${p.titulo}</h3>
                    <div class="before-after">
                        <img src="${p.antes}" alt="Antes">
                        <img src="${p.depois}" alt="Depois">
                    </div>
                </div>
            `).join('');

            // Estatísticas
            document.getElementById('stats-grid').innerHTML = stats.map(s => `
                <div class="card" style="text-align:center;">
                    <div class="stat-number" data-target="\( {s.numero}"> \){s.numero}${s.sufixo || ''}</div>
                    <p>${s.texto}</p>
                </div>
            `).join('');

            // Planos
            document.getElementById('plans-grid').innerHTML = planos.map(p => `
                <div class="card">
                    ${p.destaque ? `<div style="background:var(--primary); color:#000; padding:8px 20px; border-radius:50px; display:inline-block; margin-bottom:15px;">Mais Popular</div>` : ''}
                    <h3>${p.nome}</h3>
                    <h2 style="margin:15px 0; font-size:2.5rem;">R$ ${p.preco}</h2>
                    <ul>${p.itens.map(item => `<li>✔ ${item}</li>`).join('')}</ul>
                </div>
            `).join('');

            // Depoimentos
            document.getElementById('testimonials-grid').innerHTML = depoimentos.map(d => `
                <div class="card">
                    <p style="font-style:italic; margin-bottom:20px;">"${d.texto}"</p>
                    <strong>— ${d.nome}</strong>
                </div>
            `).join('');
        }

        function animateStats() {
            document.querySelectorAll('.stat-number').forEach(el => {
                const target = parseInt(el.getAttribute('data-target'));
                let count = 0;
                const inc = Math.ceil(target / 50);
                const timer = setInterval(() => {
                    count += inc;
                    if (count >= target) {
                        el.textContent = target + (el.textContent.includes('%') ? '%' : '');
                        clearInterval(timer);
                    } else el.textContent = count;
                }, 30);
            });
        }

        window.onload = () => {
            const saved = localStorage.getItem('userName');
            if (saved) {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('greeting').textContent = `Olá, ${saved}! 👋`;
                renderAll();
            }
            setTimeout(animateStats, 1000);
        };
    </script>
</body>
</html>
